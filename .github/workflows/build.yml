name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write

jobs:
  linux-flatpak:
    name: Linux Qt / Flatpak Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux package dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            desktop-file-utils \
            flatpak \
            flatpak-builder \
            git \
            gstreamer1.0-alsa \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio \
            libxkbcommon-dev \
            ninja-build \
            python3 \
            python3-venv \
            xz-utils
      - name: Install aQt
        run: |
          python3 -m venv "$RUNNER_TEMP/aqt"
          "$RUNNER_TEMP/aqt/bin/pip" install --no-cache-dir aqtinstall==3.3.0
          echo "$RUNNER_TEMP/aqt/bin" >> "$GITHUB_PATH"
      - name: Install Qt
        run: |
          aqt install-qt linux desktop 6.8.3 linux_gcc_64 --outputdir "$RUNNER_TEMP/Qt" -m qtmultimedia
          qt_prefix="$RUNNER_TEMP/Qt/6.8.3/gcc_64"
          echo "CMAKE_PREFIX_PATH=$qt_prefix" >> "$GITHUB_ENV"
          echo "$qt_prefix/bin" >> "$GITHUB_PATH"
          test -d "$qt_prefix/qml/QtQuick/Effects"
      - name: Install Zig
        run: |
          zig_version="0.16.0"
          zig_archive="zig-x86_64-linux-${zig_version}.tar.xz"
          zig_url="https://ziglang.org/download/${zig_version}/${zig_archive}"
          curl -fsSL "$zig_url" -o "$RUNNER_TEMP/$zig_archive"
          mkdir -p "$RUNNER_TEMP/zig"
          tar -xJf "$RUNNER_TEMP/$zig_archive" --strip-components=1 -C "$RUNNER_TEMP/zig"
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"
      - name: Add Flathub remote
        run: flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Build Linux Flatpak bundle
        env:
          AUQW_BUILD_DIR: build/linux-package
          AUQW_FLATPAK_BUILD: ON
          AUQW_FLATPAK_INSTALLATION: user
          AUQW_LINUX_FLATPAK_BUNDLE: build/linux-package/auqw-linux-x64.flatpak
          AUQW_LINUX_TARBALL: build/linux-package/auqw-linux-x64.tar.gz
        run: ./ci/linux-package.sh
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: auqw-linux-x64
          path: |
            build/linux-package/auqw-linux-x64.flatpak
            build/linux-package/auqw-linux-x64.tar.gz

  android-signing-preflight:
    name: Android Signing Preflight
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      signing-ready: ${{ steps.signing.outputs.signing-ready }}
    steps:
      - name: Check Android signing secrets
        id: signing
        env:
          AUQW_ANDROID_KEYSTORE_BASE64: ${{ secrets.AUQW_ANDROID_KEYSTORE_BASE64 }}
          AUQW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AUQW_ANDROID_KEYSTORE_PASSWORD }}
          AUQW_ANDROID_KEY_ALIAS: ${{ secrets.AUQW_ANDROID_KEY_ALIAS }}
          AUQW_ANDROID_KEY_PASSWORD: ${{ secrets.AUQW_ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for name in AUQW_ANDROID_KEYSTORE_BASE64 AUQW_ANDROID_KEYSTORE_PASSWORD AUQW_ANDROID_KEY_ALIAS AUQW_ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ "${#missing[@]}" -ne 0 ]]; then
            echo "::warning::Android release signing secrets are missing; skipping signed APK and GitHub Release: ${missing[*]}"
            echo "signing-ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "signing-ready=true" >> "$GITHUB_OUTPUT"

  android-linux:
    name: Android Linux Environment
    needs:
      - android-signing-preflight
    if: ${{ always() && (github.ref_type != 'tag' || needs.android-signing-preflight.outputs.signing-ready == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install container engine
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Free Android runner disk
        run: |
          df -h
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo podman system prune -af || true
          sudo docker system prune -af || true
          df -h
      - name: Build in Android container
        env:
          AUQW_ANDROID_KEYSTORE_BASE64: ${{ secrets.AUQW_ANDROID_KEYSTORE_BASE64 }}
          AUQW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AUQW_ANDROID_KEYSTORE_PASSWORD }}
          AUQW_ANDROID_KEY_ALIAS: ${{ secrets.AUQW_ANDROID_KEY_ALIAS }}
          AUQW_ANDROID_KEY_PASSWORD: ${{ secrets.AUQW_ANDROID_KEY_PASSWORD }}
        run: ./ci/container-build.sh android-linux
      - name: Upload Android release APK
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: auqw-android-arm64
          path: build/android-linux/apk/auqw-android-arm64.apk

  windows:
    name: Windows Environment
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install aQt
        run: python -m pip install aqtinstall==3.3.0
      - name: Install Zig
        shell: pwsh
        run: |
          $zigVersion = "0.16.0"
          $zigArchive = "zig-x86_64-windows-$zigVersion.zip"
          $zigUrl = "https://ziglang.org/download/$zigVersion/$zigArchive"
          Invoke-WebRequest -Uri $zigUrl -OutFile $zigArchive
          Expand-Archive $zigArchive -DestinationPath "$env:RUNNER_TEMP\zig"
          $zigDir = Join-Path "$env:RUNNER_TEMP\zig" "zig-x86_64-windows-$zigVersion"
          Add-Content $env:GITHUB_PATH $zigDir
      - name: Install Qt
        shell: pwsh
        run: |
          python -m aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 --outputdir "$env:RUNNER_TEMP\Qt" -m qtmultimedia
          $qtPrefix = Join-Path "$env:RUNNER_TEMP\Qt" "6.8.3\msvc2022_64"
          Add-Content $env:GITHUB_ENV "CMAKE_PREFIX_PATH=$qtPrefix"
          Add-Content $env:GITHUB_PATH (Join-Path $qtPrefix "bin")
      - name: Build Windows
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          powershell -NoLogo -NoProfile -ExecutionPolicy Bypass -File ".\ci\windows-build.ps1"
      - name: Package Windows zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/bin/* -DestinationPath build/windows/auqw-windows-x64.zip -Force
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: auqw-windows-x64
          path: build/windows/auqw-windows-x64.zip

  macos:
    name: macOS Environment
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Homebrew dependencies
        run: brew bundle --file containers/macos/Brewfile
      - name: Install aQt
        run: python -m pip install aqtinstall==3.3.0
      - name: Install Qt
        run: |
          python -m aqt install-qt mac desktop 6.8.3 clang_64 --outputdir "$RUNNER_TEMP/Qt" -m qtmultimedia
          qt_prefix="$RUNNER_TEMP/Qt/6.8.3/macos"
          echo "QT_PREFIX=$qt_prefix" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$qt_prefix" >> "$GITHUB_ENV"
          echo "$qt_prefix/bin" >> "$GITHUB_PATH"
          test -f "$qt_prefix/qml/QtQuick/Effects/qmldir"
      - name: Build macOS
        env:
          AUQW_MACOS_DMG_PATH: build/macos/auqw-macos.dmg
        run: ./ci/macos-build.sh
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: auqw-macos
          path: build/macos/auqw-macos.dmg

  ios:
    name: iOS Environment
    if: ${{ vars.AUQW_ENABLE_IOS == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Homebrew dependencies
        run: brew bundle --file containers/ios/Brewfile
      - name: Build iOS
        run: ./ci/ios-build.sh

  release:
    name: GitHub Release
    if: ${{ github.ref_type == 'tag' && needs.android-signing-preflight.outputs.signing-ready == 'true' }}
    needs:
      - android-signing-preflight
      - linux-flatpak
      - android-linux
      - windows
      - macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use plain semver like v0.0.1" >&2
            exit 1
          fi
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: auqw-linux-x64
          path: dist/auqw-linux-x64
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: auqw-android-arm64
          path: dist/auqw-android-arm64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: auqw-windows-x64
          path: dist/auqw-windows-x64
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: auqw-macos
          path: dist/auqw-macos
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: |
            dist/auqw-linux-x64/auqw-linux-x64.flatpak
            dist/auqw-linux-x64/auqw-linux-x64.tar.gz
            dist/auqw-android-arm64/auqw-android-arm64.apk
            dist/auqw-windows-x64/auqw-windows-x64.zip
            dist/auqw-macos/auqw-macos.dmg
